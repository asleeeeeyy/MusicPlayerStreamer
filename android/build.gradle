// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.1'  // Latest AGP supporting SDK 35+
        classpath 'com.google.gms:google-services:4.3.13'  // Google services plugin for Firebase
        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        // Avoid flatDir to prevent metadata warnings
        // If you have local libs, consider proper Maven repo or direct file dependencies
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
